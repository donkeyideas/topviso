name: Build Android (AAB)

# Local EAS build on a free Ubuntu runner — does NOT consume EAS Build credits.
# Run manually from the Actions tab; the resulting AAB is uploaded as an artifact.

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - preview

defaults:
  run:
    working-directory: apps/mobile

jobs:
  build:
    name: Build Android ${{ github.event.inputs.profile }}
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Decode Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::Missing secret ANDROID_KEYSTORE_BASE64"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > topviso-keystore.jks
          ls -la topviso-keystore.jks

      - name: Write credentials.json
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > credentials.json <<EOF
          {
            "android": {
              "keystore": {
                "keystorePath": "./topviso-keystore.jks",
                "keystorePassword": "${ANDROID_KEYSTORE_PASSWORD}",
                "keyAlias": "${ANDROID_KEY_ALIAS}",
                "keyPassword": "${ANDROID_KEY_PASSWORD}"
              }
            }
          }
          EOF

      - name: Run EAS local build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          GRADLE_OPTS: -Xmx4g -Dorg.gradle.jvmargs=-Xmx4g
        run: |
          mkdir -p build
          eas build \
            --local \
            --non-interactive \
            --platform android \
            --profile ${{ github.event.inputs.profile }} \
            --output ./build/topviso-${{ github.event.inputs.profile }}.aab

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: topviso-android-${{ github.event.inputs.profile }}-${{ github.run_number }}
          path: apps/mobile/build/*.aab
          retention-days: 14
